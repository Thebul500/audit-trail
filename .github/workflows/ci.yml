name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: audit_trail
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUDIT_TRAIL_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/audit_trail
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest --cov=audit_trail --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Lint
        run: ruff check src/

      - name: Type check
        run: mypy src/audit_trail/ --ignore-missing-imports

      - name: Security scan
        run: bandit -r src/audit_trail/ -q
